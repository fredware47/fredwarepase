<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fredware Pase - Sala (con sonido y notificaciones)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: #1e293b; border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 20px; border: 1px solid #334155; }
        .header h1 { font-size: 1.6rem; }
        .header h1 span { color: #38bdf8; }
        .estado { display: inline-block; background: #334155; padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; margin-top: 8px; }
        .estado.ok { background: #10b981; color: white; }
        .estado.error { background: #ef4444; }
        .estado.warning { background: #eab308; }
        .botonera { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        button { background: #3b82f6; border: none; padding: 10px 20px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.1s; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.97); }
        .btn-sonido { background: #10b981; }
        .grid-platos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-top: 20px; }
        .tarjeta { background: #1e293b; border-radius: 20px; padding: 15px; border: 1px solid #475569; text-align: center; }
        .mesa { font-size: 3rem; font-weight: 900; font-family: monospace; }
        .camarero { color: #34d399; font-size: 0.8rem; margin: 5px 0; }
        .plato { background: #020617; display: inline-block; padding: 5px 12px; border-radius: 30px; font-size: 0.9rem; margin: 8px 0; }
        .btn-retirar { background: #ef4444; width: 100%; margin-top: 10px; box-shadow: 0 3px 0 #991b1b; }
        .vacio { grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b; font-style: italic; }
        .log-area { background: #00000080; border-radius: 12px; padding: 8px; font-size: 0.7rem; margin-top: 20px; font-family: monospace; max-height: 150px; overflow-y: auto; }
    </style>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>FREDWARE <span>PASE · SALA</span></h1>
        <div id="statusBadge" class="estado">🔄 Inicializando...</div>
        <div class="botonera">
            <button id="btnTestSound" class="btn-sonido">🔊 Probar Sonido</button>
        </div>
    </div>

    <div class="grid-platos" id="platosContainer">
        <div class="vacio">Cargando comandas...</div>
    </div>

    <div class="log-area" id="logPanel">
        📡 Sistema listo. Esperando eventos...
    </div>
</div>

<script>
    // ---------- CONFIGURACIÓN ----------
    const SUPABASE_URL = "https://abwcjcohomifcilquknf.supabase.co";
    const SUPABASE_KEY = "sb_publishable_5M0b1VwXkV9nyJDUbnmDew_YLTFIlSw";
    let supabaseClient = null;
    let platosActuales = [];

    // ---------- AUDIO (simple y fiable) ----------
    let audioCtx = null;
    let audioEnabled = false;

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playBeep(freq = 800, duration = 0.2, volume = 0.5) {
        if (!audioCtx || !audioEnabled) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.value = volume;
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) { console.warn("Audio error", e); }
    }

    function sonidoNuevoPlato() {
        if (!audioEnabled) return;
        playBeep(1200, 0.1, 0.8);
        setTimeout(() => playBeep(800, 0.2, 0.9), 100);
    }

    function sonidoPanico() {
        if (!audioEnabled) return;
        playBeep(400, 0.3, 1.0);
        setTimeout(() => playBeep(600, 0.3, 1.0), 150);
        setTimeout(() => playBeep(800, 0.4, 1.0), 300);
    }

    // Botón para probar sonido y desbloquear AudioContext
    document.getElementById('btnTestSound').addEventListener('click', () => {
        initAudio();
        audioCtx.resume().then(() => {
            audioEnabled = true;
            playBeep(880, 0.2, 0.8);
            addLog("🔊 Sonido activado manualmente");
            document.getElementById('btnTestSound').style.background = '#059669';
        }).catch(e => addLog("❌ Error al activar audio: " + e.message));
    });

    // ---------- NOTIFICACIONES (para el reloj por Bluetooth) ----------
    function pedirPermisoNotificaciones() {
        if (!("Notification" in window)) {
            addLog("❌ Este navegador no soporta notificaciones");
            return;
        }
        if (Notification.permission === "default") {
            Notification.requestPermission().then(perm => {
                addLog(`📢 Permiso de notificaciones: ${perm}`);
            });
        } else {
            addLog(`📢 Estado notificaciones: ${Notification.permission}`);
        }
    }

    function enviarNotificacion(mesa, plato, camarero) {
        if (!("Notification" in window)) return;
        if (Notification.permission === "granted") {
            new Notification(`🍽️ Mesa ${mesa}`, {
                body: `${plato} · ${camarero}`,
                icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2338bdf8'/%3E%3Ctext x='50' y='67' text-anchor='middle' font-size='40' fill='white'%3E🍽%3C/text%3E%3C/svg%3E",
                vibrate: [200, 100, 200]
            });
            addLog(`🔔 Notificación enviada: Mesa ${mesa} - ${plato}`);
        }
    }

    // ---------- RENDERIZAR PLATOS ----------
    function renderizarPlatos() {
        const container = document.getElementById('platosContainer');
        if (!container) return;
        if (platosActuales.length === 0) {
            container.innerHTML = '<div class="vacio">✨ Pase limpio. Esperando comandas...</div>';
            return;
        }
        container.innerHTML = platosActuales.map(plato => `
            <div class="tarjeta">
                <div class="mesa">${escapeHtml(plato.mesa)}</div>
                <div class="camarero">🏃‍♂️ ${escapeHtml(plato.camarero || 'Sala')}</div>
                <div class="plato">${escapeHtml(plato.icono || '🍽️')} ${escapeHtml(plato.preparacion)}</div>
                <button class="btn-retirar" onclick="retirarPlato('${plato.id}')">✅ Plato servido</button>
            </div>
        `).join('');
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // ---------- RETIRAR PLATO ----------
    window.retirarPlato = async function(id) {
        if (!supabaseClient) return;
        addLog(`🗑️ Retirando plato ID ${id}`);
        try {
            await supabaseClient.from('platos').delete().eq('id', id);
            platosActuales = platosActuales.filter(p => p.id != id);
            renderizarPlatos();
        } catch(e) {
            addLog(`❌ Error al retirar: ${e.message}`);
        }
    };

    // ---------- CARGAR PLATOS EXISTENTES ----------
    async function cargarPlatosIniciales() {
        if (!supabaseClient) return;
        try {
            const { data, error } = await supabaseClient
                .from('platos')
                .select('*')
                .order('timestamp', { ascending: false });
            if (error) throw error;
            const normales = (data || []).filter(p => p.mesa !== 'TIMBRE');
            platosActuales = normales;
            renderizarPlatos();
            addLog(`📋 Cargados ${normales.length} platos pendientes`);
            document.getElementById('statusBadge').innerHTML = '🟢 Conectado';
            document.getElementById('statusBadge').className = 'estado ok';
        } catch(e) {
            addLog(`❌ Error cargando platos: ${e.message}`);
            document.getElementById('statusBadge').innerHTML = '⚠️ Error con Supabase';
            document.getElementById('statusBadge').className = 'estado error';
        }
    }

    // ---------- REALTIME: ESCUCHAR NUEVOS PLATOS ----------
    function iniciarRealtime() {
        if (!supabaseClient) return;
        const channel = supabaseClient
            .channel('sala-listener')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'platos' }, payload => {
                const nuevo = payload.new;
                addLog(`📡 INSERT recibido: Mesa ${nuevo.mesa} - ${nuevo.preparacion}`);
                
                if (nuevo.mesa === 'TIMBRE') {
                    // Alarma de pánico
                    sonidoPanico();
                    enviarNotificacion("TIMBRE", "⚠️ PÁNICO EN COCINA", "Sistema");
                    addLog("🚨 TIMBRE DE PÁNICO DETECTADO");
                    // Borrar el timbre automáticamente
                    setTimeout(async () => {
                        if (supabaseClient) await supabaseClient.from('platos').delete().eq('id', nuevo.id);
                    }, 500);
                    return;
                }
                
                // Evitar duplicados
                if (platosActuales.some(p => p.id === nuevo.id)) return;
                
                // Agregar al inicio
                platosActuales.unshift(nuevo);
                renderizarPlatos();
                
                // Sonido y notificación
                sonidoNuevoPlato();
                enviarNotificacion(nuevo.mesa, nuevo.preparacion, nuevo.camarero || 'Camarero');
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'platos' }, payload => {
                const eliminado = payload.old;
                addLog(`🗑️ DELETE recibido: ID ${eliminado.id}`);
                platosActuales = platosActuales.filter(p => p.id !== eliminado.id);
                renderizarPlatos();
            })
            .subscribe((status) => {
                addLog(`🔌 Estado canal Realtime: ${status}`);
                if (status === 'SUBSCRIBED') {
                    document.getElementById('statusBadge').innerHTML = '🟢 En línea · Realtime activo';
                    document.getElementById('statusBadge').className = 'estado ok';
                } else if (status === 'CHANNEL_ERROR') {
                    document.getElementById('statusBadge').innerHTML = '⚠️ Error Realtime';
                    document.getElementById('statusBadge').className = 'estado error';
                }
            });
    }

    // ---------- LOG EN PANTALLA ----------
    function addLog(msg) {
        const logDiv = document.getElementById('logPanel');
        if (!logDiv) return;
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(msg);
    }

    // ---------- INICIO ----------
    window.addEventListener('load', () => {
        addLog("🚀 Iniciando Fredware Sala...");
        // Inicializar Supabase
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            addLog("✅ Cliente Supabase creado");
            cargarPlatosIniciales();
            iniciarRealtime();
        } else {
            addLog("❌ Librería Supabase no cargada. Revisa la conexión a Internet.");
            document.getElementById('statusBadge').innerHTML = '❌ Supabase no disponible';
            document.getElementById('statusBadge').className = 'estado error';
        }
        
        // Pedir permiso de notificaciones
        pedirPermisoNotificaciones();
        
        // Preparar audio (no activado hasta que el usuario haga clic en el botón)
        initAudio();
        addLog("🔇 Audio desbloqueable con el botón 'Probar Sonido'");
    });
</script>
</body>
</html>
